<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MARCTERNOS | Dashboard Premium</title>
  <link rel="icon" type="image/png" href="resources/icono.png">
  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/layout.css" />
  <link rel="stylesheet" href="css/components.css" />
  <link rel="stylesheet" href="css/responsive.css" />

    <style>
      :root {
        --p-card: rgba(15, 23, 42, 0.7);
        --p-accent: #3b82f6;
        --p-text: #f8fafc;
        --p-border: rgba(255, 255, 255, 0.08);
        --p-blur: blur(16px);
      }

      .premium-fill-blue { background: linear-gradient(90deg, #3b82f6, #60a5fa) !important; box-shadow: 0 0 15px rgba(59, 130, 246, 0.4); }
      .premium-fill-green { background: linear-gradient(90deg, #22c55e, #4ade80) !important; box-shadow: 0 0 15px rgba(34, 197, 94, 0.4); }

      .console-box::-webkit-scrollbar { width: 6px; }
      .console-box::-webkit-scrollbar-track { background: transparent; }
      .console-box::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.1); border-radius: 10px; }
      .console-box::-webkit-scrollbar-thumb:hover { background: rgba(255, 255, 255, 0.2); }

      .suggestions-container {
        position: absolute;
        bottom: 100%;
        left: 0;
        width: 100%;
        background: rgba(15, 23, 42, 0.95);
        backdrop-filter: blur(10px);
        border: 1px solid rgba(59, 130, 246, 0.3);
        border-radius: 12px;
        margin-bottom: 8px;
        z-index: 100;
        max-height: 200px;
        overflow-y: auto;
        display: none;
        box-shadow: 0 10px 25px -5px rgba(0,0,0,0.5);
      }

      .suggestion-item {
        padding: 10px 16px;
        color: #94a3b8;
        cursor: pointer;
        font-family: 'JetBrains Mono', monospace;
        font-size: 0.85rem;
        transition: all 0.2s;
        border-bottom: 1px solid rgba(255, 255, 255, 0.03);
      }

      .suggestion-item:last-child { border-bottom: none; }

      .suggestion-item:hover, .suggestion-item.active {
        background: rgba(59, 130, 246, 0.2);
        color: #fff;
        padding-left: 20px;
      }
      
      .suggestion-item span { color: #3b82f6; font-weight: 700; margin-right: 8px; }
    </style>
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <img src="resources/marcternos_logo.png" alt="MARCTERNOS" class="sidebar-logo-img">
      <nav>
        <a class="nav-link active" href="index.html"><i class="fa-solid fa-gauge-high"></i> Dashboard</a>
        <a class="nav-link" href="players.html"><i class="fa-solid fa-users"></i> Jugadores</a>
        <a class="nav-link" href="files.html"><i class="fa-solid fa-folder-open"></i> Archivos</a>
        <a class="nav-link" href="properties.html"><i class="fa-solid fa-sliders"></i> Propiedades</a>
        <a class="nav-link" href="create-world.html"><i class="fa-solid fa-plus"></i> Crear Mundo</a>
      </nav>
    </aside>

    <main class="main-content">
      <header class="topbar">
        <div class="page-title">
          <h1 style="font-size: 2.2rem; font-weight: 900; letter-spacing: -0.02em; background: linear-gradient(135deg, #fff 0%, #94a3b8 100%); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;">Panel de Control</h1>
          <div style="display: flex; align-items: center; gap: 8px; margin-top: 4px;">
            <i class="fa-solid fa-server" style="color: #3b82f6; font-size: 0.8rem;"></i>
            <span id="serverName" style="color: #94a3b8; font-size: 0.95rem; font-weight: 500;">Cargando...</span>
          </div>
        </div>

        <div class="topbar-controls" style="background: rgba(15, 23, 42, 0.4); border: 1px solid rgba(255,255,255,0.05); padding: 10px 20px; border-radius: 20px;">
          <div class="topbar-status">
            <div class="status-dot dot-offline" id="statusDot" style="width: 12px; height: 12px;"></div>
            <span class="topbar-status-text" id="serverStatusText" style="text-transform: uppercase; letter-spacing: 0.05em; font-size: 0.75rem; font-weight: 800;">Apagado</span>
          </div>
          <div class="topbar-actions" style="margin-left: 10px;">
            <button class="btn success" id="startBtn" style="padding: 10px 18px; border-radius: 14px; box-shadow: 0 4px 15px -5px rgba(34, 197, 94, 0.4);"><i class="fa-solid fa-play"></i> INICIAR</button>
            <button class="btn secondary" id="restartBtn" style="padding: 10px 18px; border-radius: 14px;"><i class="fa-solid fa-rotate"></i></button>
            <button class="btn danger" id="stopBtn" style="padding: 10px 18px; border-radius: 14px; box-shadow: 0 4px 15px -5px rgba(239, 68, 68, 0.4);"><i class="fa-solid fa-stop"></i></button>
          </div>
        </div>
      </header>

      <!-- Premium Stats Row -->
      <div class="stats-row" style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 30px;">
        <!-- CPU Card -->
        <div class="card premium-card" style="padding: 20px; border-radius: 24px; position: relative; overflow: hidden; background: linear-gradient(145deg, rgba(30, 41, 59, 0.6) 0%, rgba(15, 23, 42, 0.8) 100%); border-left: 4px solid #3b82f6;">
          <div style="display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 12px;">
            <div style="width: 42px; height: 42px; background: rgba(59, 130, 246, 0.1); border-radius: 14px; display: flex; align-items: center; justify-content: center;">
              <i class="fa-solid fa-microchip" style="color: #3b82f6; font-size: 1.2rem;"></i>
            </div>
            <span id="cpuUsage" style="font-size: 1.4rem; font-weight: 800; color: #fff;">0%</span>
          </div>
          <p style="color: #94a3b8; font-size: 0.8rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em;">Uso de CPU</p>
          <div class="progress-bar" style="height: 6px; margin-top: 15px;"><div class="progress-fill premium-fill-blue" id="cpuBar"></div></div>
        </div>

        <!-- RAM Card -->
        <div class="card premium-card" style="padding: 20px; border-radius: 24px; background: linear-gradient(145deg, rgba(30, 41, 59, 0.6) 0%, rgba(15, 23, 42, 0.8) 100%); border-left: 4px solid #22c55e;">
          <div style="display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 12px;">
            <div style="width: 42px; height: 42px; background: rgba(34, 197, 94, 0.1); border-radius: 14px; display: flex; align-items: center; justify-content: center;">
              <i class="fa-solid fa-memory" style="color: #22c55e; font-size: 1.2rem;"></i>
            </div>
            <div style="text-align: right;">
              <span id="ramUsage" style="font-size: 1.1rem; font-weight: 800; color: #fff; display: block;">0 GB</span>
              <span style="font-size: 0.7rem; color: #64748b; font-weight: 600;">EN USO</span>
            </div>
          </div>
          <p style="color: #94a3b8; font-size: 0.8rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em;">Memoria RAM</p>
          <div class="progress-bar" style="height: 6px; margin-top: 15px;"><div class="progress-fill premium-fill-green" id="ramBar"></div></div>
        </div>

        <!-- Players Card -->
        <div class="card premium-card" style="padding: 20px; border-radius: 24px; background: linear-gradient(145deg, rgba(30, 41, 59, 0.6) 0%, rgba(15, 23, 42, 0.8) 100%); border-left: 4px solid #a855f7;">
          <div style="display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 12px;">
            <div style="width: 42px; height: 42px; background: rgba(168, 85, 247, 0.1); border-radius: 14px; display: flex; align-items: center; justify-content: center;">
              <i class="fa-solid fa-users" style="color: #a855f7; font-size: 1.2rem;"></i>
            </div>
            <span id="playerCount" style="font-size: 1.4rem; font-weight: 800; color: #fff;">0 / 0</span>
          </div>
          <p style="color: #94a3b8; font-size: 0.8rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em;">Jugadores</p>
          <div style="display: flex; gap: 4px; margin-top: 15px;">
            <div style="height: 6px; flex: 1; background: rgba(168, 85, 247, 0.3); border-radius: 3px;"></div>
            <div style="height: 6px; flex: 1; background: rgba(255,255,255,0.05); border-radius: 3px;"></div>
            <div style="height: 6px; flex: 1; background: rgba(255,255,255,0.05); border-radius: 3px;"></div>
          </div>
        </div>

        <!-- World Size Card -->
        <div class="card premium-card" style="padding: 20px; border-radius: 24px; background: linear-gradient(145deg, rgba(30, 41, 59, 0.6) 0%, rgba(15, 23, 42, 0.8) 100%); border-left: 4px solid #3b82f6;">
          <div style="display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 12px;">
            <div style="width: 42px; height: 42px; background: rgba(59, 130, 246, 0.1); border-radius: 14px; display: flex; align-items: center; justify-content: center;">
              <i class="fa-solid fa-hdd" style="color: #3b82f6; font-size: 1.2rem;"></i>
            </div>
            <span id="worldSize" style="font-size: 1.4rem; font-weight: 800; color: #fff;">0 MB</span>
          </div>
          <p style="color: #94a3b8; font-size: 0.8rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em;">Tamaño del Mundo</p>
        </div>
      </div>

      <div class="dashboard-grid" style="display: grid; grid-template-columns: 1fr 340px; gap: 30px;">
        <!-- Left Column: Console -->
        <div class="card" style="padding: 0; background: rgba(15, 23, 42, 0.6); border-radius: 28px; border: 1px solid rgba(255,255,255,0.05); overflow: hidden; display: flex; flex-direction: column;">
          <div style="padding: 20px 24px; background: rgba(255,255,255,0.02); border-bottom: 1px solid rgba(255,255,255,0.05); display: flex; justify-content: space-between; align-items: center;">
            <div style="display: flex; align-items: center; gap: 15px;">
              <div style="width: 10px; height: 10px; background: #22c55e; border-radius: 50%; box-shadow: 0 0 10px rgba(34, 197, 94, 0.5);"></div>
              <h3 style="margin: 0; font-size: 1.1rem; font-weight: 700;">Consola en Vivo</h3>
              <div style="background: rgba(0,0,0,0.3); padding: 4px 12px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.05); display: flex; align-items: center; gap: 8px; margin-left: 5px;">
                <i class="fa-regular fa-clock" style="color: #3b82f6; font-size: 0.75rem;"></i>
                <span id="uptime" style="font-family: 'JetBrains Mono'; font-size: 0.85rem; font-weight: 600; color: #3b82f6;">00:00:00</span>
              </div>
            </div>
            <i class="fa-solid fa-terminal" style="color: #64748b;"></i>
          </div>
          
          <div class="console-box" id="consoleOutput" style="height: 480px; background: transparent; border: none; font-size: 11px; line-height: 1.6; padding: 25px;"></div>
          
          <div style="padding: 20px 24px; background: rgba(0,0,0,0.2);">
            <form id="consoleForm">
              <div style="display: flex; gap: 12px;">
                <div style="flex: 1; position: relative;">
                  <i class="fa-solid fa-chevron-right" style="position: absolute; left: 16px; top: 50%; transform: translateY(-50%); color: #3b82f6; font-size: 0.8rem;"></i>
                  <input type="text" id="consoleCommand" placeholder="Escribe un comando..." autocomplete="off" style="width: 100%; padding: 14px 14px 14px 40px; border-radius: 16px; border: 1px solid rgba(255,255,255,0.08); background: rgba(15, 23, 42, 0.8); color: #fff; font-family: 'JetBrains Mono', monospace; font-size: 0.9rem; transition: all 0.3s; outline: none;" onfocus="this.style.borderColor='rgba(59, 130, 246, 0.5)'; this.style.boxShadow='0 0 15px rgba(59, 130, 246, 0.1)';" onblur="this.style.borderColor='rgba(255, 255, 255, 0.08)'; this.style.boxShadow='none';" />
                  <div id="commandSuggestions" class="suggestions-container"></div>
                </div>
                <button type="submit" class="btn primary" style="padding: 0 25px; border-radius: 16px; background: #3b82f6;">ENVIAR</button>
              </div>
            </form>
          </div>
        </div>

        <!-- Right Column: Info -->
        <div style="display: flex; flex-direction: column; gap: 25px;">
          <!-- Server Info Card -->
          <div class="card" style="padding: 24px; border-radius: 28px; background: linear-gradient(165deg, rgba(30, 41, 59, 0.4) 0%, rgba(15, 23, 42, 0.6) 100%);">
            <h3 style="font-size: 1.1rem; margin-bottom: 20px;"><i class="fa-solid fa-circle-info" style="color: #3b82f6; margin-right: 10px;"></i> Información</h3>
            
            <div style="display: flex; flex-direction: column; gap: 15px;">
              <div style="display: flex; justify-content: space-between; padding-bottom: 12px; border-bottom: 1px solid rgba(255,255,255,0.03);">
                <span style="color: #64748b; font-size: 0.9rem; font-weight: 500;">Versión</span>
                <span id="serverVersion" style="color: #f1f5f9; font-size: 0.9rem; font-weight: 700;">-</span>
              </div>
              <div style="display: flex; justify-content: space-between; padding-bottom: 12px; border-bottom: 1px solid rgba(255,255,255,0.03);">
                <span style="color: #64748b; font-size: 0.9rem; font-weight: 500;">IP del Servidor</span>
                <div style="text-align: right;">
                  <span style="color: #f1f5f9; font-size: 0.9rem; font-weight: 700; cursor: pointer;" onclick="navigator.clipboard.writeText('100.123.255.62'); alert('IP copiada');">100.123.255.62 <i class="fa-solid fa-copy" style="font-size: 0.7rem; margin-left: 4px; color: #3b82f6;"></i></span>
                </div>
              </div>
              <div style="display: flex; justify-content: space-between; padding-bottom: 12px; border-bottom: 1px solid rgba(255,255,255,0.03);">
                <span style="color: #64748b; font-size: 0.9rem; font-weight: 500;">Puerto</span>
                <span style="color: #f1f5f9; font-size: 0.9rem; font-weight: 700;">25565</span>
              </div>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>
  <script src="js/app.js"></script>
</body>
</html>
